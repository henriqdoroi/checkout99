<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>Obrigado</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .thankyou-screen { min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 24px; text-align: center; }
    .thankyou-card { width: 100%; max-width: 360px; background: #fff; border-radius: 28px; padding: 34px 22px; box-shadow: 0 8px 28px rgba(17,17,17,.06); }
    .thankyou-badge { width: 74px; height: 74px; border-radius: 50%; background: #e9f9f0; color: #20bf74; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 18px; }
    .thankyou-badge svg { width: 34px; height: 34px; fill: none; stroke: currentColor; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
    .thankyou-card h1 { margin: 0 0 10px; font-size: 28px; letter-spacing: -.6px; }
    .thankyou-card p { margin: 0; color: #76767d; line-height: 1.45; }
  </style>
</head>
<body>
  <main class="app">
    <section class="thankyou-screen">
      <div class="thankyou-card">
        <span class="thankyou-badge" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 12.4L9.4 16.8L19 7.2"></path></svg></span>
        <h1>Obrigado!</h1>
        <p>Seu pagamento foi confirmado com sucesso.</p>
      </div>
    </section>
  </main>
</body>
</html>
